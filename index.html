<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motormax · Project Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- ===================================================================
     FIREBASE SETUP — READ ME
     1. Go to https://console.firebase.google.com and open your new project.
     2. Build > Firestore Database > Create database (production mode).
     3. Build > Authentication > Get started > enable "Email/Password".
        Then go to the Users tab and manually add one account per PM,
        using their REAL Motormax Exchange email address, e.g.:
          elizabethyip@redboxtoy.com
          ericlai@motormaxtoy.com
          leofan@motormaxtoy.com
        Pick a separate password for each (6+ characters) — this is a
        password managed by Firebase only, NOT their Exchange/Outlook
        password. Write these down somewhere safe.
        Do NOT enable any public sign-up flow — these 3 accounts are the
        only ones that should ever exist.
     4. Project settings (gear icon) > General > Your apps > Add app > Web.
        Copy the firebaseConfig object it gives you into the block below.
     5. Paste each person's real email + the password you set in step 3
        into AUTH_CREDENTIALS below.
     6. In Firestore, replace the default rules with the locked-down
        rules provided alongside this file (require request.auth != null)
        — this is what actually keeps the data private to your team, not
        the PIN screen alone.
     7. Push this file to a GitHub repo and enable GitHub Pages
        (Settings > Pages > Deploy from branch).

     NOTE ON STORAGE: item photos and task screenshots are turned off for
     now, since Firebase Cloud Storage requires the paid Blaze plan even
     for no-cost-tier usage. Everything else (Firestore + Auth) stays on
     the free Spark plan. Ask me to re-enable photos later if you decide
     to add billing, or want a Storage-free workaround.
     =================================================================== -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
:root{
  --ink:#1B2430;
  --ink-soft:#4A5568;
  --paper:#F3F4F1;
  --paper-raised:#FFFFFF;
  --line:#D8DAD3;
  --steel:#3D5A80;
  --steel-dim:#EAF0F6;
  --amber:#C97A2C;
  --amber-dim:#FBEEDF;
  --green:#3F7856;
  --green-dim:#E8F2EC;
  --red:#B5453A;
  --red-dim:#FAEAE8;
  --radius:6px;
}
*{box-sizing:border-box;}
body{
  margin:0; background:var(--paper); color:var(--ink);
  font-family:'IBM Plex Sans',sans-serif; font-size:14px; line-height:1.5;
}
.mono{font-family:'IBM Plex Mono',monospace;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit; font-size:14px;}

/* ---------- Login ---------- */
#login-screen{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px),
    var(--paper);
  background-size:28px 28px;
}
.login-card{
  background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius);
  padding:40px 36px; width:360px; box-shadow:0 2px 0 var(--line);
}
.login-brand{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
.login-brand .stamp{
  width:34px;height:34px;border-radius:50%;border:2px solid var(--steel);
  display:flex;align-items:center;justify-content:center;color:var(--steel);font-weight:700;font-size:13px;
  transform:rotate(-8deg);
}
.login-brand h1{font-size:18px; margin:0;}
.login-sub{color:var(--ink-soft); font-size:12.5px; margin:0 0 26px;}
.user-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;}
.user-tile{
  border:1px solid var(--line); border-radius:var(--radius); padding:14px 10px; text-align:center;
  background:var(--paper); transition:.12s;
}
.user-tile:hover{border-color:var(--steel); background:var(--steel-dim);}
.user-tile.active{border-color:var(--steel); background:var(--steel-dim); box-shadow:inset 0 0 0 1px var(--steel);}
.user-tile .initials{
  width:36px;height:36px;border-radius:50%;background:var(--ink);color:#fff;display:flex;
  align-items:center;justify-content:center;font-size:13px;font-weight:600;margin:0 auto 8px;
}
.pin-row{display:flex; gap:8px; margin-bottom:14px;}
.pin-dot{
  flex:1; height:44px; border:1px solid var(--line); border-radius:var(--radius);
  display:flex; align-items:center; justify-content:center; font-size:20px; background:var(--paper);
  font-family:'IBM Plex Mono',monospace;
}
.keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
.key{
  padding:12px 0; border:1px solid var(--line); border-radius:var(--radius); background:var(--paper-raised);
  font-size:16px; font-family:'IBM Plex Mono',monospace;
}
.key:hover{background:var(--steel-dim); border-color:var(--steel);}
.key.wide{grid-column:span 1;}
.login-error{color:var(--red); font-size:12.5px; text-align:center; margin-top:10px; min-height:16px;}

/* ---------- App shell ---------- */
#app{display:none; min-height:100vh; grid-template-columns:220px 1fr;}
#app.show{display:grid;}
.sidebar{
  background:var(--ink); color:#DDE3EA; padding:20px 14px; display:flex; flex-direction:column;
}
.sb-brand{display:flex; align-items:center; gap:8px; padding:0 8px 20px; border-bottom:1px solid #2E3A4A; margin-bottom:16px;}
.sb-brand .stamp{
  width:26px;height:26px;border-radius:50%;border:2px solid var(--amber);color:var(--amber);
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transform:rotate(-8deg);
}
.sb-brand span{font-weight:600; font-size:14.5px; color:#fff;}
.nav-item{
  display:flex; align-items:center; gap:10px; padding:10px 10px; border-radius:var(--radius);
  color:#B7C1CE; font-size:13.5px; margin-bottom:2px;
}
.nav-item i{font-size:17px;}
.nav-item:hover{background:#28323F; color:#fff;}
.nav-item.active{background:var(--steel); color:#fff;}
.nav-badge{
  margin-left:auto; background:var(--amber); color:#fff; font-size:11px; font-weight:600;
  padding:1px 7px; border-radius:10px;
}
.sb-footer{margin-top:auto; padding-top:14px; border-top:1px solid #2E3A4A;}
.sb-user{display:flex; align-items:center; gap:8px; padding:8px 10px; font-size:12.5px; color:#B7C1CE;}
.sb-user .initials{
  width:26px;height:26px;border-radius:50%;background:var(--steel);color:#fff;display:flex;
  align-items:center;justify-content:center;font-size:11px;font-weight:600;
}
.sb-link{color:#8494A6; font-size:12px; padding:6px 10px; display:block;}
.sb-link:hover{color:#fff;}

.main{padding:26px 32px; overflow-y:auto; max-height:100vh;}
.page-head{display:flex; align-items:center; justify-content:between; margin-bottom:20px;}
.page-head h2{font-size:20px; margin:0; flex:1;}
.btn{
  border:1px solid var(--line); background:var(--paper-raised); padding:9px 16px; border-radius:var(--radius);
  font-size:13.5px; font-weight:500; display:inline-flex; align-items:center; gap:6px;
}
.btn:hover{border-color:var(--steel);}
.btn-primary{background:var(--steel); color:#fff; border-color:var(--steel);}
.btn-primary:hover{background:#324A68;}
.btn-sm{padding:5px 10px; font-size:12.5px;}
.btn-ghost{border-color:transparent; background:transparent;}
.btn-ghost:hover{background:var(--steel-dim);}

/* dashboard */
.stat-row{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:26px;}
.stat-card{background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px;}
.stat-card .num{font-size:26px; font-weight:600; font-family:'IBM Plex Mono',monospace;}
.stat-card .lbl{font-size:12px; color:var(--ink-soft); margin-top:2px;}
.stat-card.warn .num{color:var(--amber);}

.section-title{font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); margin:0 0 10px;}

.proj-card{
  background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius);
  padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:14px; cursor:pointer;
}
.proj-card:hover{border-color:var(--steel);}
.proj-thumb{
  width:52px;height:40px;border-radius:4px;border:1px solid var(--line); background:var(--paper) center/cover no-repeat;
  display:flex;align-items:center;justify-content:center; color:var(--ink-soft); font-size:16px; flex-shrink:0;
}
.proj-info{flex:1; min-width:0;}
.proj-info .title{font-weight:600; font-size:14px;}
.proj-info .sub{font-size:12px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; margin-top:2px;}
.progress-bar{width:120px; height:6px; background:var(--line); border-radius:3px; overflow:hidden; flex-shrink:0;}
.progress-fill{height:100%; background:var(--steel);}
.phase-badge{
  font-size:11px; font-weight:600; padding:3px 9px; border-radius:10px; background:var(--steel-dim); color:var(--steel);
  white-space:nowrap; flex-shrink:0;
}
.eta-tag{font-size:12px; color:var(--ink-soft); width:90px; flex-shrink:0;}
.eta-tag.urgent{color:var(--red); font-weight:600;}

/* table-ish list */
.list-table{background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
.list-row{display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--line); font-size:13px;}
.list-row:last-child{border-bottom:none;}
.list-row:hover{background:var(--paper);}
.task-check{
  width:20px;height:20px;border:1.5px solid var(--line); border-radius:4px; flex-shrink:0; display:flex;
  align-items:center; justify-content:center; background:var(--paper-raised);
}
.task-check.done{background:var(--green); border-color:var(--green); color:#fff;}
.task-text{flex:1;}
.task-text.done{text-decoration:line-through; color:var(--ink-soft);}
.chip{font-size:11px; padding:2px 8px; border-radius:8px; background:var(--paper); border:1px solid var(--line); color:var(--ink-soft);}
.chip.urgent{background:var(--red-dim); color:var(--red); border-color:var(--red);}

/* project detail */
.detail-head{
  background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius); padding:20px 24px; margin-bottom:20px;
  display:flex; gap:24px;
}
.field-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px 20px; flex:1;}
.field-label{font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--ink-soft); margin-bottom:3px;}
.field-val{font-size:14px; font-weight:600; font-family:'IBM Plex Mono',monospace;}
.tabs{display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:18px;}
.tab{padding:9px 16px; font-size:13.5px; color:var(--ink-soft); border-bottom:2px solid transparent; margin-bottom:-1px;}
.tab.active{color:var(--ink); border-color:var(--steel); font-weight:600;}
.phase-block{background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius); margin-bottom:12px;}
.phase-header{
  display:flex; align-items:center; gap:10px; padding:14px 18px; font-weight:600; font-size:13.5px;
}
.phase-header .stamp-circle{
  width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line); display:flex; align-items:center;
  justify-content:center; font-size:11px; font-family:'IBM Plex Mono',monospace; flex-shrink:0;
}
.phase-header .stamp-circle.complete{background:var(--green); border-color:var(--green); color:#fff;}
.phase-header .stamp-circle.partial{border-color:var(--amber); color:var(--amber);}
.phase-tasks{padding:0 18px 14px;}
.task-row{display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-top:1px solid var(--paper);}
.task-row:first-child{border-top:none;}
.task-meta{font-size:11.5px; color:var(--ink-soft); margin-top:2px; display:flex; gap:10px; flex-wrap:wrap;}
.task-meta button{background:none;border:none;color:var(--steel);font-size:11.5px;padding:0;text-decoration:underline;}

.color-tabs{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
.color-tab{
  padding:7px 14px; border:1px solid var(--line); border-radius:16px; font-size:13px; font-family:'IBM Plex Mono',monospace;
  background:var(--paper-raised);
}
.color-tab.active{background:var(--steel); border-color:var(--steel); color:#fff;}

.item-photo-frame{
  width:220px; height:165px; border:1px solid var(--line); border-radius:var(--radius); background:var(--paper);
  display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; position:relative;
}
.item-photo-frame img{width:100%; height:100%; object-fit:cover;}
.item-photo-frame .upload-hint{color:var(--ink-soft); font-size:12px; text-align:center; padding:10px;}
.photo-upload-btn{position:absolute; bottom:6px; right:6px; font-size:11px;}

.packing-table{width:100%; border-collapse:collapse; font-size:13px;}
.packing-table td, .packing-table th{padding:9px 12px; border-bottom:1px solid var(--line); text-align:left;}
.packing-table th{color:var(--ink-soft); font-weight:600; font-size:11.5px; text-transform:uppercase;}
.packing-table input{width:70px; padding:5px 7px; border:1px solid var(--line); border-radius:4px;}

/* form */
.form-card{background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius); padding:24px; max-width:760px;}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
.form-group{margin-bottom:4px;}
.form-group.full{grid-column:1/-1;}
.form-group label{display:block; font-size:12px; font-weight:600; margin-bottom:5px; color:var(--ink-soft);}
.form-group input, .form-group select{
  width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:var(--radius); background:var(--paper-raised);
}
.form-group input:focus, .form-group select:focus{outline:none; border-color:var(--steel);}
.checkbox-row{display:flex; gap:18px; align-items:center; margin-top:4px;}
.checkbox-row label{display:flex; align-items:center; gap:6px; font-size:13px; font-weight:400; color:var(--ink);}
.color-input-row{display:flex; gap:8px; align-items:center; margin-bottom:8px;}
.color-input-row input{flex:1;}
.color-input-row .code-preview{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--steel); width:90px;}

.modal-overlay{
  position:fixed; inset:0; background:rgba(27,36,48,.4); display:none; align-items:center; justify-content:center; z-index:50;
}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--paper-raised); border-radius:var(--radius); padding:24px; width:340px;}

.empty-state{padding:60px 20px; text-align:center; color:var(--ink-soft);}
.empty-state i{font-size:34px; margin-bottom:10px; display:block;}

@media(max-width:900px){
  #app.show{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .field-grid{grid-template-columns:1fr 1fr;}
  .form-grid{grid-template-columns:1fr;}
  .stat-row{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-brand"><div class="stamp">MM</div><h1>Motormax Tracker</h1></div>
    <p class="login-sub">Select your name, then enter your 4-digit PIN.</p>
    <div class="user-grid" id="user-grid"></div>
    <div id="pin-section" style="display:none;">
      <div class="pin-row" id="pin-row"></div>
      <div class="keypad" id="keypad"></div>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <div class="sidebar">
    <div class="sb-brand"><div class="stamp">MM</div><span>Motormax</span></div>
    <div class="nav-item active" data-view="dashboard"><i class="ti ti-layout-dashboard"></i> Dashboard</div>
    <div class="nav-item" data-view="projects"><i class="ti ti-list-details"></i> All Projects</div>
    <div class="nav-item" data-view="outstanding"><i class="ti ti-alert-circle"></i> Outstanding Tasks <span class="nav-badge" id="outstanding-count">0</span></div>
    <div class="nav-item" data-view="new"><i class="ti ti-square-plus"></i> New Project</div>
    <div class="sb-footer">
      <div class="sb-user"><div class="initials" id="sb-user-initials"></div><span id="sb-user-name"></span></div>
      <a class="sb-link" id="change-pin-link">Change PIN</a>
      <a class="sb-link" id="logout-link">Log out</a>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>

<!-- Change PIN modal -->
<div class="modal-overlay" id="pin-modal">
  <div class="modal-box">
    <h3 style="margin-top:0;font-size:15px;">Change PIN</h3>
    <div class="form-group"><label>New 4-digit PIN</label><input type="password" maxlength="4" id="new-pin-input"></div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn" id="pin-cancel">Cancel</button>
      <button class="btn btn-primary" id="pin-save">Save</button>
    </div>
  </div>
</div>

/* ============================================================
   WEEK-NUMBER SHIP DATE — ISO 8601 (Monday-start) week calc.
   Given a year + week number, returns the Monday and Sunday of
   that week. estShipDate stored internally is the Monday, in
   YYYY-MM-DD form, so existing "days until" logic keeps working.
   ============================================================ */
function isoWeekToDates(year, week){
  const jan4 = new Date(Date.UTC(year,0,4));
  const jan4Day = jan4.getUTCDay() || 7;
  const week1Monday = new Date(jan4);
  week1Monday.setUTCDate(jan4.getUTCDate() - jan4Day + 1);
  const monday = new Date(week1Monday);
  monday.setUTCDate(week1Monday.getUTCDate() + (week-1)*7);
  const sunday = new Date(monday);
  sunday.setUTCDate(monday.getUTCDate()+6);
  return { monday, sunday };
}
function formatShipWeek(p){
  if(!p.estShipYear || !p.estShipWeekNum) return '—';
  const { monday, sunday } = isoWeekToDates(p.estShipYear, p.estShipWeekNum);
  const fmt = d=>d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
  return `Wk ${p.estShipWeekNum}/${p.estShipYear} (${fmt(monday)}–${fmt(sunday)})`;
}

function renderPinRow(){
  const row = document.getElementById('pin-row');
  row.innerHTML = '';
  for(let i=0;i<4;i++){
    const dot = document.createElement('div');
    dot.className = 'pin-dot';
    dot.textContent = state.pinBuffer[i] ? '•' : '';
    row.appendChild(dot);
  }

function renderKeypad(){
  const pad = document.getElementById('keypad');
  const keys = ['1','2','3','4','5','6','7','8','9','⌫','0','OK'];
  pad.innerHTML = keys.map(k=>`<div class="key" data-key="${k}">${k}</div>`).join('');
  pad.querySelectorAll('.key').forEach(el=>{
    el.addEventListener('click', ()=>handleKey(el.dataset.key));
  });

function handleKey(k){
  if(k==='⌫'){ state.pinBuffer = state.pinBuffer.slice(0,-1); renderPinRow(); return; }
  if(k==='OK'){ attemptLogin(); return; }
  if(state.pinBuffer.length<4){ state.pinBuffer += k; renderPinRow(); }
  if(state.pinBuffer.length===4){ setTimeout(attemptLogin, 120); }
}
async function attemptLogin(){
  const u = state.loginSelectedUser;
  if(!u) return;
  const cred = AUTH_CREDENTIALS[u.id];
  const enteredPin = state.pinBuffer;
  document.getElementById('login-error').textContent = 'Checking…';
  try{
    await auth.signInWithEmailAndPassword(cred.email, cred.password);
  } catch(err){
    console.error(err);
    document.getElementById('login-error').textContent = 'Could not sign in — check AUTH_CREDENTIALS and that this account exists in Firebase Authentication.';
    state.pinBuffer = ''; renderPinRow();
    return;
  }
  // Now authenticated as this PM's Firebase account — safe to read/write their PIN doc.
  const docRef = db.collection('users').doc(u.id);
  let snap = await docRef.get();
  if(!snap.exists){
    // First-ever login for this account: seed a default PIN of 0000.
    await docRef.set({ name:u.name, pin:'0000' });
    snap = await docRef.get();
  }
  const storedPin = snap.data().pin;
  if(enteredPin === storedPin){
    state.currentUser = { id:u.id, name:u.name, pin:storedPin };
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('show');
    document.getElementById('sb-user-initials').textContent = initials(u.name);
    document.getElementById('sb-user-name').textContent = u.name;
    subscribeProjects();
  } else {
    await auth.signOut();
    document.getElementById('login-error').textContent = storedPin==='0000' ? 'Incorrect PIN. First login uses 0000 — change it once you\'re in.' : 'Incorrect PIN. Try again.';
    state.pinBuffer = '';
    renderPinRow();
  }
}

/* ============================================================
   HELPERS: progress, outstanding, packing
   ============================================================ */
function visibleTasks(project){
  return WORKFLOW.flatMap(p=>p.tasks.filter(t=>{
    if(!t.onlyIf) return true;
    return project.specialItems && project.specialItems[t.onlyIf];
  }).map(t=>({...t, phaseId:p.id, phaseLabel:p.label})));
}
function computeProgress(project){
  const tasks = visibleTasks(project);
  const doneCount = tasks.filter(t=>project.tasks && project.tasks[t.id] && project.tasks[t.id].done).length;
  return tasks.length ? Math.round(doneCount/tasks.length*100) : 0;
}
function currentPhaseLabel(project){
  for(const p of WORKFLOW){
    const relevant = p.tasks.filter(t=>!t.onlyIf || (project.specialItems && project.specialItems[t.onlyIf]));
    const allDone = relevant.every(t=>project.tasks && project.tasks[t.id] && project.tasks[t.id].done);
    if(!allDone) return p.label.replace(/Phase \d+ — /,'');
  }
  return 'Complete';
}
function daysUntil(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr); const now = new Date();
  return Math.ceil((d - now)/(1000*60*60*24));
}
function outstandingForProject(project){
  return visibleTasks(project).filter(t=>!(project.tasks && project.tasks[t.id] && project.tasks[t.id].done))
    .map(t=>{
      let urgent = false;
      if(t.urgent && project.estShipDate){
        const d = daysUntil(project.estShipDate);
        urgent = d !== null && d <= 30;
      }
      return {...t, urgent, projectId:project.id, projectTitle:projectTitle(project)};
    });
}
function allOutstanding(){
  return state.projects.flatMap(p=>outstandingForProject(p));
}
function projectTitle(p){ return `${p.poNumber?('PO '+p.poNumber+' — '):''}${p.modelName||'Untitled'}`; }
function packingFor(project){
  const d = PACKING_DEFAULTS[project.scale] || {pcsPerCarton:null, cartonsPerMaster:null};
  const pcsPerCarton = (project.packing && project.packing.pcsPerCarton!=null) ? project.packing.pcsPerCarton : d.pcsPerCarton;
  const cartonsPerMaster = (project.packing && project.packing.cartonsPerMaster!=null) ? project.packing.cartonsPerMaster : d.cartonsPerMaster;
  return { pcsPerCarton, cartonsPerMaster, pcsPerMaster: (pcsPerCarton&&cartonsPerMaster)? pcsPerCarton*cartonsPerMaster : null };
}

          </div>
        </div>
        <div class="form-group full">
          <label>Colours (letter + short name — the Nx#### code is generated automatically from the MengYi base number)</label>
          <div id="color-inputs"></div>
          <button class="btn btn-sm" id="add-color" type="button"><i class="ti ti-plus"></i> Add colour</button>
        </div>
      </div>
      <div style="margin-top:20px; display:flex; gap:10px;">
        <button class="btn btn-primary" id="save-project"><i class="ti ti-device-floppy"></i> ${isEdit?'Save changes':'Create project'}</button>
        <button class="btn" id="cancel-project">Cancel</button>
      </div>
    </div>
  `;
  let colorRows = isEdit && existing.colors && existing.colors.length
    ? existing.colors.map(c=>({letter:c.letter, name:c.name||'', _orig:c}))
    : [{letter:'A', name:''}];
  const box = document.getElementById('color-inputs');
  function mengyiVal(){ return document.getElementById('f-mengyi').value || '####'; }
  function paintColorRows(){
    box.innerHTML = colorRows.map((c,i)=>`
      <div class="color-input-row" data-idx="${i}">
        <input style="max-width:60px" value="${c.letter}" data-field="letter" maxlength="1" placeholder="A">
        <input value="${c.name}" data-field="name" placeholder="Colour name e.g. Red">
        <span class="code-preview" data-preview>N${c.letter||'x'}${mengyiVal()}</span>
        ${colorRows.length>1?`<button class="btn btn-sm btn-ghost remove-color" type="button"><i class="ti ti-x"></i></button>`:''}
      </div>`).join('');
  }
  paintColorRows();
  // Event delegation on the container — attached ONCE, so typing never
  // triggers a full re-render and the input never loses focus.
  box.addEventListener('input', (e)=>{
    const row = e.target.closest('.color-input-row'); if(!row) return;
    const idx = Number(row.dataset.idx);
    const field = e.target.dataset.field; if(!field) return;
    if(field==='letter'){
      const upper = e.target.value.toUpperCase().slice(0,1);
      colorRows[idx].letter = upper;
      if(e.target.value !== upper) e.target.value = upper;
    } else {
      colorRows[idx].name = e.target.value;
    }
    row.querySelector('[data-preview]').textContent = `N${colorRows[idx].letter||'x'}${mengyiVal()}`;
  });
  box.addEventListener('click', (e)=>{
    const btn = e.target.closest('.remove-color'); if(!btn) return;
    const row = btn.closest('.color-input-row');
    colorRows.splice(Number(row.dataset.idx),1);
    paintColorRows();
  });
  document.getElementById('f-mengyi').addEventListener('input', ()=>{
    box.querySelectorAll('.color-input-row').forEach(row=>{
      const idx = Number(row.dataset.idx);
      row.querySelector('[data-preview]').textContent = `N${colorRows[idx].letter||'x'}${mengyiVal()}`;
    });
  });
  document.getElementById('add-color').addEventListener('click', ()=>{
    const nextLetter = String.fromCharCode(65 + colorRows.length);
    colorRows.push({letter:nextLetter, name:''});
    paintColorRows();
  });
  function updateEtaPreview(){
    const wk = Number(document.getElementById('f-eta-week').value);
    const yr = Number(document.getElementById('f-eta-year').value);
    const prev = document.getElementById('f-eta-preview');
    if(wk>=1 && wk<=53 && yr){
      const { monday, sunday } = isoWeekToDates(yr, wk);
      prev.textContent = `${monday.toLocaleDateString(undefined,{month:'short',day:'numeric'})} – ${sunday.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})}`;
    } else prev.textContent = '';
  }
  updateEtaPreview();
  document.getElementById('f-eta-week').addEventListener('input', updateEtaPreview);
  document.getElementById('f-eta-year').addEventListener('input', updateEtaPreview);
  document.getElementById('cancel-project').addEventListener('click', ()=>{ state.editingProjectId=null; state.view='dashboard'; render(); });
  document.getElementById('save-project').addEventListener('click', async ()=>{
    if(isEdit && !requireEdit(existing)) return;
    const mengyiBase = document.getElementById('f-mengyi').value.trim();
    const colors = colorRows.filter(c=>c.letter).map(c=>({
      photoURL:'', exportQty:null, domesticQty:null, toolingLog:[],
      ...(c._orig||{}),
      letter:c.letter, name:c.name, mengyiCode:`N${c.letter}${mengyiBase}`,
    }));
    const wk = Number(document.getElementById('f-eta-week').value)||null;
    const yr = Number(document.getElementById('f-eta-year').value)||null;
    let estShipDate = null;
    if(wk && yr){ estShipDate = isoWeekToDates(yr, wk).monday.toISOString().slice(0,10); }
    const fields = {
      poNumber: document.getElementById('f-po').value.trim(),
      modelName: document.getElementById('f-model').value.trim(),
      scale: document.getElementById('f-scale').value,
      norevNumber: document.getElementById('f-norev').value.trim(),
      mengyiBaseNumber: mengyiBase,
      motormaxItemNumber: document.getElementById('f-motormax').value.trim(),
      motormaxPM: document.getElementById('f-pm').value,
      qty: Number(document.getElementById('f-qty').value)||null,
      estShipWeekNum: wk,
      estShipYear: yr,
      estShipDate,
      specialItems: {
        chassisPlate: document.getElementById('f-chassis').checked,
        booklet: document.getElementById('f-booklet').checked,
        hologram: document.getElementById('f-holo').checked,
      },
      colors,
    };
    if(!fields.modelName){ alert('Please enter a model name.'); return; }
    if(isEdit){
      await db.collection('projects').doc(existing.id).update(fields);
      state.editingProjectId = null;
      state.activeProjectId = existing.id; state.detailTab='workflow'; state.view='dashboard';
    } else {
      const project = { ...fields, packing:{}, tasks:{}, createdAt:Date.now(), createdByName:state.currentUser.name, createdByUserId:state.currentUser.id };
      const ref = await db.collection('projects').add(project);
      state.activeProjectId = ref.id; state.detailTab='workflow'; state.view='dashboard';
    }
    render();
  });
}

/* ---------- Project detail ---------- */
function renderProjectDetail(main){
  const p = state.projects.find(x=>x.id===state.activeProjectId);
  if(!p){ state.activeProjectId=null; render(); return; }
  const prog = computeProgress(p);
  const editable = canEdit(p);
  main.innerHTML = `
    <div class="page-head">
      <button class="btn btn-ghost btn-sm" id="back-btn"><i class="ti ti-arrow-left"></i> Back</button>
      <h2 style="margin-left:10px;">${p.modelName}</h2>
      ${editable?`<button class="btn btn-sm" id="edit-project-btn"><i class="ti ti-pencil"></i> Edit project</button>`:`<span class="chip" style="margin-left:10px;"><i class="ti ti-lock"></i> View only — created by ${p.createdByName||'another PM'}</span>`}
    </div>
    <div class="detail-head">
      <div class="field-grid">
        <div><div class="field-label">PO Number</div><div class="field-val">${p.poNumber||'—'}</div></div>
        <div><div class="field-label">Norev #</div><div class="field-val">${p.norevNumber||'—'}</div></div>
        <div><div class="field-label">MengYi base #</div><div class="field-val">${p.mengyiBaseNumber||'—'}</div></div>
        <div><div class="field-label">Motormax item #</div><div class="field-val">${p.motormaxItemNumber||'—'}</div></div>
        <div><div class="field-label">Scale</div><div class="field-val">${p.scale||'—'}</div></div>
        <div><div class="field-label">Motormax PM</div><div class="field-val" style="font-family:inherit;font-weight:600;">${p.motormaxPM||'—'}</div></div>
        <div><div class="field-label">Order qty</div><div class="field-val">${p.qty||'—'}</div></div>
        <div><div class="field-label">Est. ship</div><div class="field-val" style="font-size:12.5px;">${formatShipWeek(p)}</div></div>
        <div><div class="field-label">Progress</div><div class="field-val">${prog}%</div></div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab ${state.detailTab==='workflow'?'active':''}" data-tab="workflow">Workflow</div>
      <div class="tab ${state.detailTab==='items'?'active':''}" data-tab="items">Items / Colours</div>
      <div class="tab ${state.detailTab==='packing'?'active':''}" data-tab="packing">Packing</div>
    </div>
    <div id="tab-content"></div>
  `;
  document.getElementById('back-btn').addEventListener('click', ()=>{ state.activeProjectId=null; render(); });
  const editBtn = document.getElementById('edit-project-btn');
  if(editBtn) editBtn.addEventListener('click', ()=>{ state.editingProjectId = p.id; state.activeProjectId = null; state.view='new'; render(); });
  main.querySelectorAll('.tab').forEach(t=>t.addEventListener('click', ()=>{ state.detailTab=t.dataset.tab; renderProjectDetail(main); }));
  const tc = document.getElementById('tab-content');
  if(state.detailTab==='workflow') renderWorkflowTab(tc, p);
  else if(state.detailTab==='items') renderItemsTab(tc, p);
  else renderPackingTab(tc, p);
}

function renderWorkflowTab(tc, p){
  tc.innerHTML = WORKFLOW.map(phase=>{
    const relevant = phase.tasks.filter(t=>!t.onlyIf || (p.specialItems && p.specialItems[t.onlyIf]));
    if(!relevant.length) return '';
    const doneCount = relevant.filter(t=>p.tasks && p.tasks[t.id] && p.tasks[t.id].done).length;
    const stampClass = doneCount===relevant.length ? 'complete' : doneCount>0 ? 'partial' : '';
    return `
      <div class="phase-block">
        <div class="phase-header">
          <div class="stamp-circle ${stampClass}">${doneCount===relevant.length?'<i class="ti ti-check"></i>':doneCount+'/'+relevant.length}</div>
          ${phase.label}
        </div>
        <div class="phase-tasks">
          ${relevant.map(t=>taskRowHTML(p, t)).join('')}
        </div>
      </div>`;
  }).join('');
  attachTaskEvents(tc, p);
}
function taskRowHTML(p, t){
  const rec = (p.tasks && p.tasks[t.id]) || {};
  const done = !!rec.done;
  const urgent = t.urgent && p.estShipDate && !done && daysUntil(p.estShipDate)<=30;
  return `
    <div class="task-row" data-tid="${t.id}">
      <div class="task-check ${done?'done':''}" data-action="toggle">${done?'<i class="ti ti-check" style="font-size:13px;"></i>':''}</div>
      <div style="flex:1;">
        <div class="task-text ${done?'done':''}">${t.text} ${urgent?'<span class="chip urgent">Due soon</span>':''}</div>
        <div class="task-meta">
          <span>${done?('✓ '+(rec.doneBy||'')+' on '+(rec.doneDate?new Date(rec.doneDate).toLocaleDateString():'—')):'Not marked done'}</span>
          <button data-action="setdonedate">${rec.doneDate?'Edit date':'Log date'}</button>
          ${t.rd?`<span>${rec.receivedDate?('Received '+new Date(rec.receivedDate).toLocaleDateString()):'No received date logged'}</span> <button data-action="setdate">Log date</button>`:''}
          ${t.sd?`<span>${rec.sentDate?('Sent '+new Date(rec.sentDate).toLocaleDateString()):'No sent date logged'}</span> <button data-action="setsentdate">Log sent date</button>`:''}
          ${t.rd?`<button data-action="note">${rec.note?'Edit note':'Add note (e.g. link to file)'}</button>`:''}
          ${rec.note?`<span class="chip">${rec.note}</span>`:''}
        </div>
      </div>
    </div>`;
}
function attachTaskEvents(tc, p){
  tc.querySelectorAll('.task-row').forEach(row=>{
    const tid = row.dataset.tid;
    row.querySelector('[data-action="toggle"]').addEventListener('click', async ()=>{
      if(!requireEdit(p)) return;
      const rec = (p.tasks && p.tasks[tid]) || {};
      const newDone = !rec.done;
      const update = {
        [`tasks.${tid}.done`]: newDone,
        [`tasks.${tid}.doneBy`]: newDone ? state.currentUser.name : null,
        [`tasks.${tid}.doneDate`]: newDone ? new Date().toISOString() : null,
      };
      await db.collection('projects').doc(p.id).update(update);
    });
    const doneDateBtn = row.querySelector('[data-action="setdonedate"]');
    if(doneDateBtn) doneDateBtn.addEventListener('click', async ()=>{
      if(!requireEdit(p)) return;
      const rec = (p.tasks && p.tasks[tid]) || {};
      const val = prompt('Date for this task (YYYY-MM-DD):', (rec.doneDate||new Date().toISOString()).slice(0,10));
      if(!val) return;
      await db.collection('projects').doc(p.id).update({
        [`tasks.${tid}.doneDate`]: val,
        [`tasks.${tid}.doneBy`]: rec.doneBy || state.currentUser.name,
      });
    });
    const dateBtn = row.querySelector('[data-action="setdate"]');
    if(dateBtn) dateBtn.addEventListener('click', async ()=>{
      if(!requireEdit(p)) return;
      const val = prompt('Received date (YYYY-MM-DD):', new Date().toISOString().slice(0,10));
      if(!val) return;
      await db.collection('projects').doc(p.id).update({ [`tasks.${tid}.receivedDate`]: val });
    });
    const sentBtn = row.querySelector('[data-action="setsentdate"]');
    if(sentBtn) sentBtn.addEventListener('click', async ()=>{
      if(!requireEdit(p)) return;
      const val = prompt('Sent date (YYYY-MM-DD):', new Date().toISOString().slice(0,10));
      if(!val) return;
      await db.collection('projects').doc(p.id).update({ [`tasks.${tid}.sentDate`]: val });
    });
    const noteBtn = row.querySelector('[data-action="note"]');
    if(noteBtn) noteBtn.addEventListener('click', async ()=>{
      if(!requireEdit(p)) return;
      const rec = (p.tasks && p.tasks[tid]) || {};
      const val = prompt('Note (e.g. a link to the file/screenshot in Google Drive or email):', rec.note||'');
      if(val===null) return;
      await db.collection('projects').doc(p.id).update({ [`tasks.${tid}.note`]: val });
    });
  });
}

function renderItemsTab(tc, p){
  const colors = p.colors || [];
  if(!colors.length){ tc.innerHTML = `<div class="empty-state"><i class="ti ti-palette"></i>No colours added to this project yet.</div>`; return; }
  const totalExport = colors.reduce((s,c)=>s+(c.exportQty||0),0);
  const totalDomestic = colors.reduce((s,c)=>s+(c.domesticQty||0),0);
  tc.innerHTML = `
    <div class="color-tabs">${colors.map(c=>`<div class="color-tab" data-letter="${c.letter}">${c.mengyiCode} ${c.name?('· '+c.name):''}</div>`).join('')}</div>
    <p style="color:var(--ink-soft);font-size:13px;">Select a colour to open its item page (product numbers, packing, tooling tracking, shipment split).</p>
    ${(totalExport||totalDomestic)?`<div class="section-title" style="margin-top:16px;">PO shipment split (all colours)</div>
    <p style="font-size:13px;"><span class="chip">Export: ${totalExport}</span> <span class="chip">Domestic: ${totalDomestic}</span></p>`:''}
  `;
  tc.querySelectorAll('.color-tab').forEach(el=>{
    el.addEventListener('click', ()=>{ state.activeColorLetter = el.dataset.letter; render(); });
  });
}

function renderPackingTab(tc, p){
  const pack = packingFor(p);
  tc.innerHTML = `
    <table class="packing-table">
      <tr><th>Scale</th><th>Pcs / 外箱</th><th>外箱 / 百寶箱</th><th>Pcs / 百寶箱</th></tr>
      <tr>
        <td class="mono">${p.scale}</td>
        <td><input id="pk-pcs" type="number" value="${pack.pcsPerCarton??''}"></td>
        <td><input id="pk-cartons" type="number" value="${pack.cartonsPerMaster??''}"></td>
        <td class="mono">${pack.pcsPerMaster??'—'}</td>
      </tr>
    </table>
    <p style="color:var(--ink-soft);font-size:12.5px;margin-top:10px;">Packed in polyfoam box, then closed/window box, then 外箱, then 百寶箱.</p>
    <button class="btn btn-sm" id="pk-save" style="margin-top:8px;">Save packing</button>
  `;
  document.getElementById('pk-save').addEventListener('click', async ()=>{
    if(!requireEdit(p)) return;
    const pcs = Number(document.getElementById('pk-pcs').value)||null;
    const cartons = Number(document.getElementById('pk-cartons').value)||null;
    await db.collection('projects').doc(p.id).update({ packing: { pcsPerCarton:pcs, cartonsPerMaster:cartons } });
  });
}

/* ---------- Item (colour) detail page ---------- */
async function saveColorPatch(p, letter, patch){
  const newColors = (p.colors||[]).map(c=>c.letter===letter?{...c, ...patch}:c);
  await db.collection('projects').doc(p.id).update({ colors: newColors });
}
function renderItemDetail(main){
  const p = state.projects.find(x=>x.id===state.activeProjectId);
  if(!p){ state.activeProjectId=null; render(); return; }
  const color = (p.colors||[]).find(c=>c.letter===state.activeColorLetter);
  if(!color){ state.activeColorLetter=null; render(); return; }
  const pack = packingFor(p);
  const editable = canEdit(p);
  const toolingLog = color.toolingLog || [];
  main.innerHTML = `
    <div class="page-head">
      <button class="btn btn-ghost btn-sm" id="back-btn"><i class="ti ti-arrow-left"></i> Back to project</button>
      <h2 style="margin-left:10px;">${color.mengyiCode} — ${color.name||''}</h2>
    </div>
    <div style="display:flex; gap:24px; align-items:flex-start; margin-bottom:22px;">
      <div class="item-photo-frame" id="item-photo-frame">
        <div class="upload-hint"><i class="ti ti-photo" style="font-size:24px;display:block;margin-bottom:6px;"></i>Photo uploads are off for now<br>(Storage needs a paid plan)</div>
      </div>
      <div class="field-grid" style="flex:1;">
        <div><div class="field-label">Norev product #</div><div class="field-val">${p.norevNumber||'—'}</div></div>
        <div><div class="field-label">MengYi product #</div><div class="field-val">${color.mengyiCode}</div></div>
        <div><div class="field-label">Motormax item #</div><div class="field-val">${p.motormaxItemNumber||'—'}</div></div>
        <div><div class="field-label">Scale</div><div class="field-val">${p.scale}</div></div>
        <div><div class="field-label">Pcs / 外箱</div><div class="field-val">${pack.pcsPerCarton??'—'}</div></div>
        <div><div class="field-label">外箱 / 百寶箱</div><div class="field-val">${pack.cartonsPerMaster??'—'}</div></div>
        <div><div class="field-label">Chassis plate</div><div class="field-val" style="font-family:inherit;">${p.specialItems&&p.specialItems.chassisPlate?'Yes':'No'}</div></div>
        <div><div class="field-label">Booklet / Hologram</div><div class="field-val" style="font-family:inherit;">${[p.specialItems&&p.specialItems.booklet?'Booklet':null, p.specialItems&&p.specialItems.hologram?'Hologram':null].filter(Boolean).join(', ')||'—'}</div></div>
      </div>
    </div>
    <div class="section-title">Packaging structure</div>
    <p style="font-size:13px;color:var(--ink-soft);">Polyfoam box → closed/window box → 外箱 (${pack.pcsPerCarton??'?'} pcs) → 百寶箱${pack.cartonsPerMaster?(' ('+pack.cartonsPerMaster+' 外箱, '+pack.pcsPerMaster+' pcs total)'):''}.</p>

    <div class="section-title" style="margin-top:22px;">Shipment split — export vs domestic</div>
    <div class="phase-block" style="padding:14px 18px;">
      <div style="display:flex; gap:16px; align-items:flex-end;">
        <div class="form-group"><label>Export qty</label><input id="qty-export" type="number" value="${color.exportQty??''}" style="width:140px;" ${editable?'':'disabled'}></div>
        <div class="form-group"><label>Domestic qty</label><input id="qty-domestic" type="number" value="${color.domesticQty??''}" style="width:140px;" ${editable?'':'disabled'}></div>
        ${editable?`<button class="btn btn-sm" id="qty-save">Save</button>`:''}
        ${p.qty?`<span class="chip">PO total: ${p.qty}</span>`:''}
      </div>
    </div>

    <div class="section-title" style="margin-top:22px;">Tooling location tracking</div>
    <div class="phase-block" style="padding:14px 18px;">
      ${toolingLog.length?`
        <table class="packing-table" style="margin-bottom:12px;">
          <tr><th>Date</th><th>Direction</th><th>Location</th></tr>
          ${toolingLog.slice().reverse().map(e=>`<tr><td class="mono">${e.date}</td><td>${e.direction}</td><td>${e.location}</td></tr>`).join('')}
        </table>` : `<p style="font-size:13px;color:var(--ink-soft);margin-top:0;">No tooling movements logged yet.</p>`}
      ${editable?`
        <div style="display:flex; gap:10px; align-items:flex-end;">
          <div class="form-group"><label>Date</label><input id="tool-date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
          <div class="form-group"><label>Direction</label>
            <select id="tool-direction"><option value="IN">IN</option><option value="OUT">OUT</option></select>
          </div>
          <div class="form-group" style="flex:1;"><label>Location</label><input id="tool-location" placeholder="e.g. Factory A — Building 3"></div>
          <button class="btn btn-sm" id="tool-add">Add entry</button>
        </div>` : ''}
    </div>
  `;
  document.getElementById('back-btn').addEventListener('click', ()=>{ state.activeColorLetter=null; render(); });
  const qtySaveBtn = document.getElementById('qty-save');
  if(qtySaveBtn) qtySaveBtn.addEventListener('click', async ()=>{
    if(!requireEdit(p)) return;
    const exportQty = Number(document.getElementById('qty-export').value)||null;
    const domesticQty = Number(document.getElementById('qty-domestic').value)||null;
    await saveColorPatch(p, color.letter, { exportQty, domesticQty });
  });
  const toolAddBtn = document.getElementById('tool-add');
  if(toolAddBtn) toolAddBtn.addEventListener('click', async ()=>{
    if(!requireEdit(p)) return;
    const date = document.getElementById('tool-date').value;
    const direction = document.getElementById('tool-direction').value;
    const location = document.getElementById('tool-location').value.trim();
    if(!date || !location){ alert('Please enter both a date and a location.'); return; }
    const entry = { date, direction, location, loggedBy: state.currentUser.name };
    await saveColorPatch(p, color.letter, { toolingLog: [...toolingLog, entry] });
  });
}
</script>
</body>
</html>
